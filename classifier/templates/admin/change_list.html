{% extends "admin/change_list.html" %}

{% block content %}

<div class="dashboard-grid">

    <div class="dashboard-card">
        <h3>Total Predictions</h3>
        <p>{{ total_predictions }}</p>
    </div>

    <div class="dashboard-card">
        <h3>Average Confidence</h3>
        <p>{{ avg_confidence }}%</p>
    </div>

    <div class="dashboard-card">
        <h3>Top Label</h3>
        <p>{{ top_label }}</p>
    </div>

    <div class="dashboard-card">
        <h3>Total Users</h3>
        <p>{{ unique_users }}</p>
    </div>

</div>

{{ block.super }}

{% endblock %}
